<!DOCTYPE html>
<html>
<head>
  <title>Polygon Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { height:100vh; width:100vw; }
  </style>
</head>

<body>
<div id="map" style="height:100vh; width:100%;"></div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// Get raw path
let raw = getParam("path");

// Safety check
if (!raw) {
  document.body.innerHTML = "<h3 style='font-family:Arial;padding:20px;'>No coordinates received</h3>";
} else {

  // Decode + clean spaces
  raw = decodeURIComponent(raw).replace(/\s/g, "");

  // Convert into array
  const arr = raw.split(",");

  let points = [];

  // Convert pairs → [lat, lng]
  for (let i = 0; i < arr.length; i += 2) {
    const lat = parseFloat(arr[i]);
    const lng = parseFloat(arr[i + 1]);

    if (!isNaN(lat) && !isNaN(lng)) {
      points.push([lat, lng]);
    }
  }

  // Check minimum points
  if (points.length < 3) {
    document.body.innerHTML = "<h3 style='font-family:Arial;padding:20px;'>Not enough points to form polygon</h3>";
  } else {

    // Create map
    const map = L.map('map').setView(points[0], 18);

    // Base map layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Draw polygon
    const polygon = L.polygon(points, {
      color: "blue",
      fillColor: "cyan",
      fillOpacity: 0.4
    }).addTo(map);

    // Fit map to shape
    map.fitBounds(polygon.getBounds());
  }
}
</script>

</body>
</html>
