<!DOCTYPE html>
<html>
<head>
  <title>Polygon Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Turf.js for area/perimeter -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { height:100vh; width:100vw; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  const rawPath = decodeURIComponent(getParam("path") || "");
  const polygonName = decodeURIComponent(getParam("name") || "Polygon");
  const polygonColor = decodeURIComponent(getParam("color") || "cyan");
  const assetType = decodeURIComponent(getParam("type") || "Unknown");

  if (!rawPath) {
    document.body.innerHTML = "<h3 style='font-family:Arial;padding:20px;'>No polygon data received</h3>";
  } else {

    const arr = rawPath.replace(/\s/g, "").split(",").filter(x => x !== "");

    let points = [];
    for (let i = 0; i < arr.length - 1; i += 2) {
      const lat = parseFloat(arr[i]);
      const lng = parseFloat(arr[i + 1]);

      if (!isNaN(lat) && !isNaN(lng)) {
        points.push([lat, lng]);
      }
    }

    if (points.length < 3) {
      document.body.innerHTML = "<h3 style='font-family:Arial;padding:20px;'>Not enough points to form polygon</h3>";
    } else {

      const map = L.map('map').setView(points[0], 18);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      // Convert to Turf format (lng, lat)
      const turfCoords = points.map(p => [p[1], p[0]]);
      turfCoords.push(turfCoords[0]); // close polygon

      const turfPolygon = turf.polygon([turfCoords]);

      const areaM2 = turf.area(turfPolygon);
      const perimeterM = turf.length(turf.polygonToLine(turfPolygon), { units: "kilometers" }) * 1000;

      const areaText = areaM2.toFixed(2) + " m²";
      const perimeterText = perimeterM.toFixed(2) + " m";

      // Asset type based border styling (layer feel)
      let borderColor = "black";
      let borderWeight = 2;

      if (assetType.toLowerCase() === "runway") {
        borderColor = "red";
        borderWeight = 4;
      } else if (assetType.toLowerCase() === "taxiway") {
        borderColor = "orange";
        borderWeight = 3;
      } else if (assetType.toLowerCase() === "apron") {
        borderColor = "blue";
        borderWeight = 3;
      } else if (assetType.toLowerCase() === "drainage") {
        borderColor = "green";
        borderWeight = 3;
      } else if (assetType.toLowerCase() === "building zone") {
        borderColor = "purple";
        borderWeight = 3;
      }

      const polygon = L.polygon(points, {
        color: borderColor,
        weight: borderWeight,
        fillColor: polygonColor,
        fillOpacity: 0.4
      }).addTo(map);

      map.fitBounds(polygon.getBounds());

      const popupContent = `
        <b>${polygonName}</b><br>
        <b>Asset Type:</b> ${assetType}<br>
        <b>Fill Color:</b> ${polygonColor}<br>
        <b>Area:</b> ${areaText}<br>
        <b>Perimeter:</b> ${perimeterText}
      `;

      polygon.bindPopup(popupContent).openPopup();
    }
  }
</script>

</body>
</html>
