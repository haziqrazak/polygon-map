<!DOCTYPE html>
<html>
<head>
  <title>Polygon Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { height:100vh; width:100vw; }
  </style>
</head>

<body>
<div id="map" style="height:100vh; width:100%;"></div>

<script>
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const raw = decodeURIComponent(getParam("path") || "");

if (!raw) {
  document.body.innerHTML = "<h3>No data received</h3>";
} else {

  const arr = raw.split(",").filter(x => x !== "");

  let points = [];

  for (let i = 0; i < arr.length - 1; i += 2) {

    const lat = parseFloat(arr[i].trim());
    const lng = parseFloat(arr[i + 1].trim());

    if (!isNaN(lat) && !isNaN(lng)) {
      points.push([lat, lng]);
    }
  }

  if (points.length < 3) {
    document.body.innerHTML = "<h3>Not enough points to form polygon</h3>";
  } else {

    const map = L.map('map').setView(points[0], 18);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const polygon = L.polygon(points, {
      color: "blue",
      fillColor: "cyan",
      fillOpacity: 0.4
    }).addTo(map);

    map.fitBounds(polygon.getBounds());
  }
}
</script>

</body>
</html>
