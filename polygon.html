<!DOCTYPE html>
<html>
<head>
  <title>Polygon Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { height:100vh; width:100vw; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
  function getParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return parseFloat(urlParams.get(name));
  }

  const lat1 = getParam("lat1");
  const lon1 = getParam("lon1");
  const lat2 = getParam("lat2");
  const lon2 = getParam("lon2");
  const lat3 = getParam("lat3");
  const lon3 = getParam("lon3");
  const lat4 = getParam("lat4");
  const lon4 = getParam("lon4");

  const polygonPoints = [
    [lat1, lon1],
    [lat2, lon2],
    [lat3, lon3],
    [lat4, lon4]
  ];

  const map = L.map('map').setView([lat1, lon1], 18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const polygon = L.polygon(polygonPoints, {
    color: "blue",
    fillColor: "cyan",
    fillOpacity: 0.4
  }).addTo(map);

  map.fitBounds(polygon.getBounds());
</script>

</body>
</html>
